name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and publish
        required: true
        type: string

env:
  BINARY_NAME: cbar
  RUST_TOOLCHAIN: 1.94.1
  TARGET: x86_64-unknown-linux-gnu
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET }}

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libxkbcommon-dev pkgconf

      - name: Build release binary
        run: cargo build --release --target "${TARGET}"

      - name: Package release asset
        shell: bash
        run: |
          version="${RELEASE_TAG}"
          asset_name="${BINARY_NAME}-${version}-${TARGET}"
          binary_path="target/${TARGET}/release/${BINARY_NAME}"

          mkdir -p dist
          cp "${binary_path}" "dist/${BINARY_NAME}"
          chmod +x "dist/${BINARY_NAME}"
          tar -C dist -czf "${asset_name}.tar.gz" "${BINARY_NAME}"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v7
        with:
          name: release-x86_64-linux
          path: "*.tar.gz"
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged asset
        uses: actions/download-artifact@v5
        with:
          name: release-x86_64-linux
          path: release-assets

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*.tar.gz)

          if (( ${#assets[@]} == 0 )); then
            echo "No packaged release assets were downloaded."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              "${assets[@]}"
          fi
